name: Bug Report
description: Report a problem with the Agent Resume Panel VS Code extension
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please do **not** paste API keys, full conversation transcripts, or sensitive file paths.
  - type: input
    id: version
    attributes:
      label: Extension version
      description: e.g. 2.6.6 (from Extensions view)
      placeholder: "2.6.6"
    validations:
      required: true
  - type: input
    id: vscode
    attributes:
      label: VS Code / VSCodium version
      placeholder: "1.92.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: 1. Open Agent Resume … 2. Click … 3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (optional)
      description: Output panel or Developer Tools console — redact secrets